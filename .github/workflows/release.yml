name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl # Pi 4 (64-bit OS)
          - armv7-unknown-linux-musleabihf # Pi 4 (32-bit OS)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cross build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: homeostat-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/homeostat
      - run: tar -C target/${{ matrix.target }}/release -czf homeostat-${{ matrix.target }}.tar.gz homeostat
      - uses: softprops/action-gh-release@v2
        with:
          files: homeostat-${{ matrix.target }}.tar.gz
          # semver convention: a hyphen in the tag (v0.2.0-rc1) = pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker:
    # assembles multi-arch images from the prebuilt static binaries -
    # no qemu-emulated Rust compilation
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Arrange binaries per docker platform
        run: |
          mkdir -p dist/linux/amd64 dist/linux/arm64 dist/linux/arm/v7
          install -m 755 artifacts/homeostat-x86_64-unknown-linux-musl/homeostat dist/linux/amd64/
          install -m 755 artifacts/homeostat-aarch64-unknown-linux-musl/homeostat dist/linux/arm64/
          install -m 755 artifacts/homeostat-armv7-unknown-linux-musleabihf/homeostat dist/linux/arm/v7/
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            # pre-releases (hyphen in tag) never move :latest
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
