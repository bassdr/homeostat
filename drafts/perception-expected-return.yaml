# =============================================================================
# DRAFT: expected-return model for away detection
# =============================================================================
# Occupancy stops quantizing away-ness into away/away_returning/away_far;
# perception publishes presence facts plus two time-until-return sensors, and
# the daemon derives the old three buckets at its input boundary
# (state.rs::Occupancy::derive). decide() and its matrix are untouched.
#
#   sensor.homeostat_occupancy    home / home_asleep / away   (3 states)
#   binary_sensor.homeostat_heading_home  confirmed en route (car navigating
#                                 home AND the car is with David)
#   sensor.homeostat_return_floor earliest possible arrival, minutes: phone
#                                 travel time home (traffic-aware: ~20 min at
#                                 night, 45-60 at rush hour), distance at
#                                 100 km/h as fallback; 0 = vacuous floor
#   sensor.homeostat_return_eta   credible estimate, minutes; 0 = no estimate.
#                                 Confirmed heading home means "worst case,
#                                 home in floor minutes" so the floor is the
#                                 estimate; otherwise manual/calendar; else 0.
#
# The car's position deliberately does NOT tighten the floor: a lower bound
# stays true whether or not the car is with David (nobody gets him home
# faster than a car ride). It only guards heading_home - car nav means
# "David returning" only when the car is with him, not when someone else
# drives it home.
#
# Both time sensors are rounded to 5 min: templates referencing now() re-render
# every minute, so bucket transitions reach the daemon as ordinary state
# changes (it stays event-driven, no clock), and the rounding is the hysteresis
# that keeps nav jitter from flapping decisions.
#
# NOT part of configuration.d - merging this into the live package means:
#   1. replace the occupancy sensor with the version below
#   2. add the two return sensors and the input_datetime
#   3. delete binary_sensor.homeostat_returning_home (superseded by
#      homeostat_heading_home) and add the Waze travel-time integration
#      (origin person.david_racine, destination zone.home) as
#      sensor.david_time_to_home for the traffic-aware floor
#   4. delete input_number.homeostat_away_far_distance (policy moved to the
#      daemon: FAR_MIN in state.rs; note far now starts at ~200 km on
#      distance data alone, vs the old knob's 100 km default)
#   5. deploy perception BEFORE the daemon build that carries Presence::parse
#      (the new parser rejects the legacy five-state values and suspends)
# =============================================================================

input_datetime:
  homeostat_expected_return:
    name: Homeostat expected return
    # manual estimate of when someone is next home; ignored once in the
    # past, so it needs no reset automation. Later: written by a calendar
    # automation instead of a dashboard knob.
    has_date: true
    has_time: true
    icon: mdi:home-clock

template:
  - sensor:
      - name: homeostat_occupancy
        unique_id: homeostat_occupancy
        icon: mdi:account-question
        state: >
          {% if is_state('alarm_control_panel.home_alarm', 'armed_away') %}
            away
          {% else %}
            {% set mf = states.binary_sensor.alarm_main_floor %}
            {% set bs = states.binary_sensor.alarm_basement %}
            {% set quiet = mf is not none and bs is not none
               and mf.state == 'off' and bs.state == 'off'
               and (now() - mf.last_changed).total_seconds() > 1800
               and (now() - bs.last_changed).total_seconds() > 1800 %}
            {% if is_state('input_boolean.homeostat_sleep_override', 'on')
                  or (is_state('sun.sun', 'below_horizon') and quiet) %}
              home_asleep
            {% else %}
              home
            {% endif %}
          {% endif %}

  - binary_sensor:
      - name: homeostat_heading_home
        unique_id: homeostat_heading_home
        icon: mdi:home-import-outline
        # confirmed en route, not merely nearby: the car is navigating home
        # AND the car is with David (unknown car/person position fails the
        # guard - never confirm returning on missing data). Sources are
        # OR'ed; add more as they prove out (companion-app driving
        # detection + proximity direction, transit apps).
        state: >
          {{ is_state('device_tracker.pointer_route', 'home')
             and distance('device_tracker.pointer_location', 'person.david_racine')
                 | float(999) < 1 }}

  - sensor:
      - name: homeostat_return_floor
        unique_id: homeostat_return_floor
        unit_of_measurement: min
        state_class: measurement
        icon: mdi:map-marker-distance
        # earliest possible arrival. Primary: live travel time home for
        # David's phone (Waze integration, knows night vs rush hour).
        # Fallback: distance / 100 km/h. Floored to 5 min (a lower bound
        # must round down to stay true); unknown GPS gives 0, the vacuously
        # true floor.
        state: >
          {% set travel = states('sensor.david_time_to_home') | float(0) %}
          {% if travel > 0 %}
            {{ (travel / 5) | round(0, 'floor') * 5 }}
          {% else %}
            {{ (distance('zone.home', 'person.david_racine') | float(0)
                * 60 / 100 / 5) | round(0, 'floor') * 5 }}
          {% endif %}

      - name: homeostat_return_eta
        unique_id: homeostat_return_eta
        unit_of_measurement: min
        state_class: measurement
        icon: mdi:home-clock-outline
        # 0 = no estimate (same convention as the comfort hold). Confirmed
        # heading home = "worst case, home in floor minutes", so the floor
        # is the estimate; real estimates are held at >= 5 min so they can
        # never collapse to 0.
        state: >
          {% if is_state('binary_sensor.homeostat_heading_home', 'on') %}
            {{ [states('sensor.homeostat_return_floor') | float(0), 5] | max }}
          {% else %}
            {% set manual_ts = state_attr('input_datetime.homeostat_expected_return', 'timestamp') | float(0) %}
            {% set mins = (manual_ts - now().timestamp()) / 60 %}
            {% if mins > 0 %}
              {{ (mins / 5) | round(0, 'ceil') * 5 }}
            {% else %}
              0
            {% endif %}
          {% endif %}
        attributes:
          source: >
            {% if is_state('binary_sensor.homeostat_heading_home', 'on') %}
              heading_home
            {% elif (state_attr('input_datetime.homeostat_expected_return', 'timestamp') | float(0))
                    > now().timestamp() %}
              manual
            {% else %}
              none
            {% endif %}
